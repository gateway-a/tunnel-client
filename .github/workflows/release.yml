name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gateway-tunnel-${{ matrix.target }}.tar.gz gateway-tunnel
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-tunnel-${{ matrix.target }}
          path: gateway-tunnel-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gateway-tunnel-x86_64-unknown-linux-gnu/gateway-tunnel-x86_64-unknown-linux-gnu.tar.gz
            gateway-tunnel-aarch64-unknown-linux-gnu/gateway-tunnel-aarch64-unknown-linux-gnu.tar.gz
          generate_release_notes: true
