name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            curl -sL https://musl.cc/aarch64-linux-musl-cross.tgz | tar -xz
            echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-musl-gcc" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gateway-tunnel-${{ matrix.target }}.tar.gz gateway-tunnel
          cd ../../..
          shasum -a 256 gateway-tunnel-${{ matrix.target }}.tar.gz > gateway-tunnel-${{ matrix.target }}.tar.gz.sha256

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path gateway-tunnel.exe -DestinationPath ../../../gateway-tunnel-${{ matrix.target }}.zip
          cd ../../..
          $hash = (Get-FileHash -Algorithm SHA256 "gateway-tunnel-${{ matrix.target }}.zip").Hash.ToLower()
          "$hash  gateway-tunnel-${{ matrix.target }}.zip" | Out-File -Encoding ascii "gateway-tunnel-${{ matrix.target }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-tunnel-${{ matrix.target }}
          path: |
            gateway-tunnel-${{ matrix.target }}.tar.gz
            gateway-tunnel-${{ matrix.target }}.tar.gz.sha256
            gateway-tunnel-${{ matrix.target }}.zip
            gateway-tunnel-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts and combine checksums
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          find artifacts -type f -name '*.sha256' -exec cat {} \; | sort > release/SHA256SUMS.txt
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS.txt
          generate_release_notes: true
